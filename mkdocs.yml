site_name: Dan's Service Desk Knowledge Base
site_description: IT service desk knowledge base — procedures, policies, and reference documentation
site_url: https://dgooding.github.io/MKDocs-figuring-out-stuff/
repo_url: https://github.com/dgooding/MKDocs-figuring-out-stuff
repo_name: dgooding/MKDocs-figuring-out-stuff
edit_uri: edit/master/docs/
copyright: Dan's Service Desk Knowledge Base

theme:
  name: material
  custom_dir: overrides
  language: en
  favicon: assets/favicon.svg
  logo: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  # Material's search plugin is required for the header search bar UI
  - material/search:
      lang: en
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: timeago
      fallback_to_build_date: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dgooding/MKDocs-figuring-out-stuff
      name: Repository
  generator: false
  tags: {}

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.progressbar
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting started:
      - Overview: getting-started/overview.md
  - Guides:
      - Convert files to Markdown: guides/convert-files-to-markdown.md
  - How-to:
      - Password reset: how-to/password-reset.md
      - VPN access: how-to/vpn-access.md
      - Software requests: how-to/software-requests.md
      - New hire checklist: how-to/new-hire-checklist.md
      - Email troubleshooting: how-to/email-troubleshooting.md
      - Remote desktop: how-to/remote-desktop.md
      - Hardware requests: how-to/hardware-requests.md
      - Printers & peripherals: how-to/printers-peripherals.md
  - Policies:
      - Incident severity: policies/incident-severity.md
      - SLA overview: policies/sla-overview.md
      - Change management: policies/change-management.md
  - Reference:
      - Escalation matrix: reference/escalation-matrix.md
      - KB authoring: reference/kb-authoring.md
      - Security incident: reference/security-incident.md
